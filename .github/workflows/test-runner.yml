name: Docker Go Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Скачиваем свежий код
      - name: Check out repository code
        uses: actions/checkout@v4

      # 2. Собираем Docker-образ
      - name: Build Docker Image
        run: docker build -t my-go-app:latest .

      # 3. Перезапускаем контейнер на домашнем сервере
      - name: Deploy Container
        run: |
          # Останавливаем старый контейнер, если он существует
          docker stop my-go-app-container || true

          # Удаляем старый контейнер, чтобы освободить имя
          docker rm my-go-app-container || true

          # Запускаем новый контейнер
          # -d: в фоне, --name: имя контейнера, -p: проброс портов (внешний:внутренний)
          docker run -d \
            --name my-go-app-container \
            --restart always \
            -p 8081:8081 \
            my-go-app:latest

      # 4. Очистка неиспользуемых старых слоев (чтобы диск сервера не забивался)
      - name: Clean up old Docker images
        run: docker image prune -f
