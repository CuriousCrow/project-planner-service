name: Test My Home Runner

# Запускать сценарий при каждом пуше в ветку main или master
on:
  push:
    branches: [ main, master ]

jobs:
  test-job:
    # КРИТИЧЕСКИ ВАЖНО: указываем GitHub искать именно ваш self-hosted раннер
    runs-on: self-hosted

    steps:
      - name: Проверяем исходный код проекта
        uses: actions/checkout@v4

      - name: Проверяем окружение на домашнем сервере
        run: |
          echo "Привет с домашнего сервера!"
          echo "Текущий пользователь:" && whoami
          echo "Версия Docker:" && docker --version || echo "Docker не установлен"

      - name: Финальный тест
        run: echo "Ура, всё работает отлично!"
