version: "2"
run:
  # Тайм-аут для проверки больших проектов
  timeout: 5m

linters:
  # Отключаем все линтеры по умолчанию, чтобы включить только нужные
  default: none

  enable:
    - errcheck    # Проверяет необработанные ошибки
    - govet       # Официальный инструмент анализа кода Go
    - ineffassign # Находит бесполезные присваивания переменных
    - staticcheck # Огромный набор проверок на баги и производительность
    - unused      # Ищет неиспользуемый код
    - revive      # Замена устаревшему golint с гибкой настройкой
  settings:
    revive:
      # Минимальная степень уверенности линтера для вывода предупреждения (от 0.0 до 1.0)
      confidence: 0.8

      # Список и конфигурация правил (rules)
      rules:
        # 1. Название пакета должно совпадать с именем директории
        - name: package-comments
          disabled: true # Отключаем обязательные комментарии к пакету (часто они избыточны)

        # 2. Проверка именования переменных, функций, структур (camelCase, CamelCase)
        - name: var-naming
          severity: warning
          arguments:
            - ["ID", "URL", "IP"] # Разрешенные аббревиатуры в верхнем регистре
            - []                  # Список зарезервированных слов, которые нужно игнорировать

        # 3. Контроль экспортируемых сущностей (публичные функции/структуры должны иметь комментарии)
        - name: exported
          severity: warning
          arguments:
            - "checkPrivateReceivers" # Проверять ли методы приватных структур

        # 4. Проверка на пустые блоки (пустой if, пустой фор)
        - name: empty-block
          severity: warning

        # 5. Предупреждение при использовании "голых" возвратов в именованных результатах (naked returns)
        - name: bare-return
          severity: warning

        # 6. Проверка структуры if-else (предлагает убирать else, если в if есть return)
        - name: indent-error-flow
          severity: warning

        # 7. Контроль сложности функций (цикломатическая сложность)
        - name: cyclomatic
          severity: warning
          arguments:
            - 15 # Максимально допустимая сложность (если выше — код тяжело читать)

        # 8. Ограничение на количество аргументов в функции
        - name: argument-limit
          severity: warning
          arguments:
            - 5 # Если параметров больше 5, линтер предложит объединить их в структуру
formatters:
  enable:
    - gofmt
issues:
  # Максимальное количество сообщений об ошибках с одинаковым текстом
  max-same-issues: 0
